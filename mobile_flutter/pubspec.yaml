name: encuesta_geo
description: Encuesta Geo — Aplicación móvil para el levantamiento de encuestas parroquiales georeferenciadas.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  geolocator: ^11.0.0
  geocoding: ^4.0.0
  image_picker: ^1.0.7
  shared_preferences: ^2.2.2
  connectivity_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
